serenity {
  project {
    name = "Quality Mindset Portfolio By Adriana Torres"
  }

  requirements {
    dir = "src/test/resources/features"
    types = ["feature", "story", "capability"]
  }

  take.screenshots = FOR_FAILURES
  reports.show.step.details = true
}

headless.mode = false

chrome.switches = "--no-sandbox;--disable-dev-shm-usage;--disable-gpu"

environments {
  default {
    base.url = "https://www.saucedemo.com"
  }
}

webdriver {
  driver = chrome

  capabilities {
    browserName = "chrome"

    "goog:chromeOptions" {
      args = [
        "incognito",
        "disable-notifications",
        "no-sandbox",
        "disable-dev-shm-usage",
        "remote-allow-origins=*"
      ]

      prefs {
        "credentials_enable_service" = false
        "profile.password_manager_enabled" = false
      }
    }
  }
}